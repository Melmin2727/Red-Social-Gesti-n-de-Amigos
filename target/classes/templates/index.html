<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Red Social - Panel de Gestión</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>

<body>
    <div class="container">
        <h1>Red Social - Gestión de Amigos</h1>

        <!-- Mensaje general -->
        <div th:if="${mensaje}" class="alert">
            <p th:text="${mensaje}"></p>
        </div>

        <!-- ESTADO DEL USUARIO -->
        <div th:if="${usuarioSeleccionado}" class="alert alert-info estado-usuario">
            <p>Estás gestionando a: <strong th:text="${usuarioSeleccionado.nombre}"></strong></p>
            <p>Amigos actuales: <span th:text="${usuarioSeleccionado.amigos}"></span></p>
        </div>

        <!-- FORMULARIO DE REGISTRO - FULL WIDTH -->
        <div class="card full-width-card">
            <h3>Registrar Nuevo Usuario</h3>
            <form th:action="@{/crearUsuario}" method="post">
                <input type="text" name="nombre" placeholder="Nombre del nuevo usuario" required>
                <button type="submit">Crear Cuenta</button>
            </form>
        </div>

        <!-- ⭐ LAYOUT PRINCIPAL: Lista Izquierda + CRUDs Derecha ⭐ -->
        <div class="main-layout">
            <!-- LISTA DE USUARIOS (IZQUIERDA - STICKY) -->
            <div class="card list-card">
                <h3>Contactos</h3>
                <div th:each="u : ${usuarios}" class="user-item">
                    <span>
                        <span class="user-icon">👤</span>
                        <span class="user-badge" th:text="${u.nombre}"></span>
                    </span>
                    <span class="friends-pill" th:title="${u.amigos}">
                        <span th:text="${u.getAmigos().size()}">0</span> amigos
                    </span>
                </div>
            </div>

            <!-- CONTENEDOR DE CRUDs (DERECHA - GRID 2x2) -->
            <div class="actions-container">
                <!-- AGREGAR AMIGO -->
                <div class="card">
                    <h3>Agregar Amigo</h3>
                    <form th:action="@{/agregarAmigo}" method="post">
                        <input type="text" name="usuario" placeholder="¿Quién agrega?" list="listaUsuarios" required>
                        <input type="text" name="amigo" placeholder="Nombre del amigo" list="listaReferenciaAmigos"
                            required>
                        <button type="submit">Agregar</button>
                    </form>
                </div>

                <!-- ELIMINAR AMIGO -->
                <div class="card">
                    <h3>Eliminar Amigo</h3>
                    <form th:action="@{/eliminarAmigo}" method="post">
                        <input type="text" name="usuario" placeholder="¿Quién elimina?" list="listaUsuarios" required>
                        <input type="text" name="amigo" placeholder="Nombre del amigo a borrar"
                            list="listaReferenciaAmigos" required>
                        <button type="submit" class="btn-delete">Eliminar</button>
                    </form>
                </div>

                <!-- AMIGOS EN COMÚN -->
                <div class="card">
                    <h3>Amigos en Común</h3>
                    <form th:action="@{/amigosEnComun}" method="post">
                        <input type="text" name="usuario1" placeholder="Usuario 1" list="listaUsuarios" required>
                        <input type="text" name="usuario2" placeholder="Usuario 2" list="listaUsuarios" required>
                        <button type="submit">Ver Comunes</button>
                    </form>
                    <div th:if="${comunes}" class="result-box">
                        <p th:text="${comunes}"></p>
                    </div>
                </div>

                <!-- SUGERENCIAS -->
                <div class="card">
                    <h3>Sugerencias</h3>
                    <form th:action="@{/sugerencias}" method="post">
                        <input type="text" name="usuario" placeholder="Tu nombre" list="listaUsuarios" required>
                        <button type="submit">Ver Sugerencias</button>
                    </form>
                    <div th:if="${sugerencias}" class="result-box">
                        <p th:text="${sugerencias}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- LISTAS DE SUGERENCIA (Fuera del container para mejor rendimiento) -->
    <datalist id="listaUsuarios">
        <option th:each="u : ${usuarios}" th:value="${u.nombre}"></option>
    </datalist>

    <datalist id="listaReferenciaAmigos">
        <option th:each="u : ${usuarios}" th:value="${u.nombre}" th:label="'(Posible amigo)'"></option>
    </datalist>
</body>

</html>
